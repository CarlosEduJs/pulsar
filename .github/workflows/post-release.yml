# Post-release tasks: changelog generation and Homebrew tap publish.
# Runs after a release is published. Kept separate from release.yml
# (which is auto-generated by cargo-dist) to avoid template conflicts.
name: Post-Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  changelog:
    name: Generate changelog
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --latest --output CHANGELOG.md
      - name: Update release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release view "$TAG" --json body --jq '.body' > /tmp/current_body.txt
          {
            cat CHANGELOG.md
            echo ""
            echo "---"
            echo ""
            cat /tmp/current_body.txt
          } > /tmp/combined.md
          gh release edit "$TAG" --notes-file /tmp/combined.md

  homebrew:
    name: Publish Homebrew formula
    runs-on: ubuntu-22.04
    needs: [changelog]
    steps:
      - name: Download Homebrew formula from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release download "$TAG" --pattern "*.rb" --dir /tmp/formula
          ls -la /tmp/formula/

      - name: Publish to homebrew-pulsar tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set, skipping Homebrew publish"
            exit 0
          fi

          FORMULA_FILE=$(ls /tmp/formula/*.rb 2>/dev/null | head -1)
          if [ -z "$FORMULA_FILE" ]; then
            echo "No formula file found in release assets"
            exit 0
          fi

          FORMULA_NAME=$(basename "$FORMULA_FILE")
          echo "Publishing $FORMULA_NAME for ${{ github.event.release.tag_name }}"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/carlosedujs/homebrew-pulsar.git" /tmp/tap
          cp "$FORMULA_FILE" "/tmp/tap/$FORMULA_NAME"

          cd /tmp/tap
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add "$FORMULA_NAME"
          git commit -m "Update ${FORMULA_NAME} for ${{ github.event.release.tag_name }}"
          git push
