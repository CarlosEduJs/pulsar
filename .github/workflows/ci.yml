name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build (release)
        run: cargo build --release --locked

      - name: Smoke test (all fixtures)
        run: |
          echo "=== basic.ts (expects 1 error) ==="
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/basic.ts > /tmp/smoke.txt 2>&1 || true
          cat /tmp/smoke.txt
          grep -q "error" /tmp/smoke.txt || { echo "FAIL: basic.ts"; exit 1; }

          echo "=== with-where.ts (expects 1 error) ==="
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/with-where.ts > /tmp/smoke.txt 2>&1 || true
          cat /tmp/smoke.txt
          grep -q "error" /tmp/smoke.txt || { echo "FAIL: with-where.ts"; exit 1; }

          echo "=== with-limit.ts (expects 1 error) ==="
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/with-limit.ts > /tmp/smoke.txt 2>&1 || true
          cat /tmp/smoke.txt
          grep -q "error" /tmp/smoke.txt || { echo "FAIL: with-limit.ts"; exit 1; }

          echo "=== mixed-star-explicit.ts (expects 2 errors) ==="
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/mixed-star-explicit.ts > /tmp/smoke.txt 2>&1 || true
          cat /tmp/smoke.txt
          grep -q "error" /tmp/smoke.txt || { echo "FAIL: mixed-star-explicit.ts"; exit 1; }

          echo "=== clean.ts (expects exit 0, no output) ==="
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/clean.ts > /tmp/smoke.txt 2>/dev/null
          cat /tmp/smoke.txt
          [ ! -s /tmp/smoke.txt ] || { echo "FAIL: clean.ts should have no stdout"; exit 1; }

          echo "=== no-issues.ts (expects exit 0, no output) ==="
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/no-issues.ts > /tmp/smoke.txt 2>/dev/null
          cat /tmp/smoke.txt
          [ ! -s /tmp/smoke.txt ] || { echo "FAIL: no-issues.ts should have no stdout"; exit 1; }

          echo "=== invalid-syntax.ts (expects exit 0, parse error on stderr) ==="
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/invalid-syntax.ts > /tmp/smoke.txt 2>/dev/null
          cat /tmp/smoke.txt
          [ ! -s /tmp/smoke.txt ] || { echo "FAIL: invalid-syntax.ts should have no stdout"; exit 1; }

      - name: Smoke test (json — expects non-empty)
        run: |
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/basic.ts --format json > /tmp/smoke.json 2>/dev/null || true
          cat /tmp/smoke.json
          jq -e 'length > 0' /tmp/smoke.json || { echo "FAIL: expected non-empty JSON array"; exit 1; }

      - name: Smoke test (json — clean file expects empty array)
        run: |
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/no-issues.ts --format json > /tmp/smoke.json 2>/dev/null
          cat /tmp/smoke.json
          jq -e 'length == 0' /tmp/smoke.json || { echo "FAIL: expected empty JSON array"; exit 1; }
