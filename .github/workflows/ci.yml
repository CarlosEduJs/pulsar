name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build (release)
        run: cargo build --release --locked

      - name: Smoke test (all fixtures)
        run: |
          # helpers: 1=fixture_path, 2=expected_rule_id (optional), remaining args forwarded to `pulsar check`
          expect_diags() {
            local fixture="$1"
            local expected_rule="${2:-}"
            shift 2
            echo "=== $fixture (expects diagnostics) ==="
            cargo run --release --locked -p pulsar-cli -- check "$fixture" "$@" > /tmp/smoke.txt 2>&1 || true
            cat /tmp/smoke.txt
            [ -s /tmp/smoke.txt ] || { echo "FAIL: $fixture should have diagnostic output"; exit 1; }
            if [ -n "$expected_rule" ]; then
              grep -q "$expected_rule" /tmp/smoke.txt || { echo "FAIL: $fixture missing rule id $expected_rule"; exit 1; }
            else
              grep -qE "no-select-star|no-missing-limit|no-unbounded-find|no-always-true-where|no-query-in-loop|no-query-in-callback|no-n-plus-one|no-raw-sql-dangerous|no-missing-await|no-unindexed-filter|no-unknown-column|no-missing-foreign-key" /tmp/smoke.txt || { echo "FAIL: $fixture missing rule id"; exit 1; }
            fi
          }
          expect_clean() {
            local fixture="$1"
            shift
            echo "=== $fixture (expects 0 diagnostics) ==="
            cargo run --release --locked -p pulsar-cli -- check "$fixture" "$@" > /tmp/smoke.txt 2>/dev/null
            cat /tmp/smoke.txt
            [ ! -s /tmp/smoke.txt ] || { echo "FAIL: $fixture should have no stdout"; exit 1; }
          }
          expect_clean() {
            local fixture="$1"
            echo "=== $fixture (expects 0 diagnostics) ==="
            cargo run --release --locked -p pulsar-cli -- check "$fixture" > /tmp/smoke.txt 2>/dev/null
            cat /tmp/smoke.txt
            [ ! -s /tmp/smoke.txt ] || { echo "FAIL: $fixture should have no stdout"; exit 1; }
          }
          expect_parse_error() {
            local fixture="$1"
            echo "=== $fixture (expects parse error on stderr) ==="
            cargo run --release --locked -p pulsar-cli -- check "$fixture" > /tmp/smoke.txt 2>/tmp/smoke_stderr.txt
            cat /tmp/smoke.txt
            [ ! -s /tmp/smoke.txt ] || { echo "FAIL: $fixture should have no stdout"; exit 1; }
            cat /tmp/smoke_stderr.txt >&2
            grep -q "Error parsing" /tmp/smoke_stderr.txt || { echo "FAIL: $fixture expected parse error on stderr"; exit 1; }
          }

          expect_diags test/fixtures/basic.ts "no-select-star"
          expect_diags test/fixtures/with-where.ts "no-select-star"
          expect_diags test/fixtures/with-limit.ts "no-select-star"
          expect_diags test/fixtures/mixed-star-explicit.ts "no-select-star"
          expect_clean test/fixtures/clean.ts
          expect_clean test/fixtures/no-issues.ts
          expect_parse_error test/fixtures/invalid-syntax.ts
          expect_diags test/fixtures/no-missing-limit/query-without-limit.ts "no-missing-limit"
          expect_clean test/fixtures/no-missing-limit/query-with-limit.ts
          expect_diags test/fixtures/no-unbounded-find/unbounded-query.ts "no-unbounded-find"
          expect_clean test/fixtures/no-unbounded-find/bounded-query.ts
          expect_diags test/fixtures/no-always-true-where/where-true.ts "no-always-true-where"
          expect_clean test/fixtures/no-always-true-where/where-real-condition.ts
          expect_diags test/fixtures/no-query-in-loop/query-in-for-loop.ts "no-query-in-loop"
          expect_clean test/fixtures/no-query-in-loop/query-outside-loop.ts
          expect_diags test/fixtures/no-n-plus-one/query-in-for-of.ts "no-n-plus-one"
          expect_clean test/fixtures/no-n-plus-one/clean.ts
          expect_diags test/fixtures/no-query-in-callback/query-in-then.ts "no-query-in-callback"
          expect_clean test/fixtures/no-query-in-callback/clean.ts
          expect_diags test/fixtures/no-raw-sql-dangerous/sql-template.ts "no-raw-sql-dangerous"
          expect_clean test/fixtures/no-raw-sql-dangerous/clean.ts
          expect_diags test/fixtures/no-missing-await/missing-await.ts "no-missing-await"
          expect_clean test/fixtures/no-missing-await/clean.ts

          # Schema-aware tests (use --config to load prisma schema)
          expect_diags test/fixtures/no-unindexed-filter/filter-on-name.ts "no-unindexed-filter" --config test/fixtures/schema/pulsar.toml
          expect_clean test/fixtures/no-unindexed-filter/filter-on-indexed.ts --config test/fixtures/schema/pulsar.toml
          expect_clean test/fixtures/no-unindexed-filter/clean.ts --config test/fixtures/schema/pulsar.toml
          expect_diags test/fixtures/no-unknown-column/select-wrong.ts "no-unknown-column" --config test/fixtures/schema/pulsar.toml
          expect_clean test/fixtures/no-unknown-column/clean.ts --config test/fixtures/schema/pulsar.toml
          expect_clean test/fixtures/no-missing-foreign-key/clean.ts --config test/fixtures/schema/pulsar.toml

      - name: Smoke test (json — expects non-empty)
        run: |
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/basic.ts --format json > /tmp/smoke.json 2>/dev/null || true
          cat /tmp/smoke.json
          jq -e 'length > 0' /tmp/smoke.json || { echo "FAIL: expected non-empty JSON array"; exit 1; }

      - name: Smoke test (json — clean file expects empty array)
        run: |
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/no-issues.ts --format json > /tmp/smoke.json 2>/dev/null
          cat /tmp/smoke.json
          jq -e 'length == 0' /tmp/smoke.json || { echo "FAIL: expected empty JSON array"; exit 1; }
