name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build (release)
        run: cargo build --release --locked

      - name: Smoke test (all fixtures)
        run: |
          # helpers: 0=expected_diags, 1=fixture_path
          expect_diags() {
            local fixture="$1"
            local count="$2"
            echo "=== $fixture (expects $count diagnostic(s)) ==="
            cargo run --release --locked -p pulsar-cli -- check "$fixture" > /tmp/smoke.txt 2>&1 || true
            cat /tmp/smoke.txt
            # verify rule id is present (distinguishes pulsar diag from generic errors)
            grep -q "no-select-star" /tmp/smoke.txt || { echo "FAIL: $fixture missing rule id"; exit 1; }
            # verify the expected count in summary
            grep -q "$count error" /tmp/smoke.txt || { echo "FAIL: $fixture expected $count error(s)"; exit 1; }
          }
          expect_clean() {
            local fixture="$1"
            echo "=== $fixture (expects 0 diagnostics) ==="
            cargo run --release --locked -p pulsar-cli -- check "$fixture" > /tmp/smoke.txt 2>/dev/null
            cat /tmp/smoke.txt
            [ ! -s /tmp/smoke.txt ] || { echo "FAIL: $fixture should have no stdout"; exit 1; }
          }
          expect_parse_error() {
            local fixture="$1"
            echo "=== $fixture (expects parse error on stderr) ==="
            cargo run --release --locked -p pulsar-cli -- check "$fixture" > /tmp/smoke.txt 2>/tmp/smoke_stderr.txt
            cat /tmp/smoke.txt
            [ ! -s /tmp/smoke.txt ] || { echo "FAIL: $fixture should have no stdout"; exit 1; }
            cat /tmp/smoke_stderr.txt >&2
            grep -q "Error parsing" /tmp/smoke_stderr.txt || { echo "FAIL: $fixture expected parse error on stderr"; exit 1; }
          }

          expect_diags test/fixtures/basic.ts 1
          expect_diags test/fixtures/with-where.ts 1
          expect_diags test/fixtures/with-limit.ts 1
          expect_diags test/fixtures/mixed-star-explicit.ts 2
          expect_clean test/fixtures/clean.ts
          expect_clean test/fixtures/no-issues.ts
          expect_parse_error test/fixtures/invalid-syntax.ts

      - name: Smoke test (json — expects non-empty)
        run: |
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/basic.ts --format json > /tmp/smoke.json 2>/dev/null || true
          cat /tmp/smoke.json
          jq -e 'length > 0' /tmp/smoke.json || { echo "FAIL: expected non-empty JSON array"; exit 1; }

      - name: Smoke test (json — clean file expects empty array)
        run: |
          cargo run --release --locked -p pulsar-cli -- check test/fixtures/no-issues.ts --format json > /tmp/smoke.json 2>/dev/null
          cat /tmp/smoke.json
          jq -e 'length == 0' /tmp/smoke.json || { echo "FAIL: expected empty JSON array"; exit 1; }
