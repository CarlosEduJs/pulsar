name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: check (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build (release)
        run: cargo build --release --locked

      - name: Smoke test (fixtures)
        run: |
          output=$(cargo run --release --locked -p pulsar-cli -- check test/fixtures/ 2>&1) || true
          echo "$output"
          echo "$output" | grep -q "error" || { echo "FAIL: expected 'error' in output"; exit 1; }

      - name: Smoke test (json)
        run: |
          output=$(cargo run --release --locked -p pulsar-cli -- check test/fixtures/ --format json 2>&1) || true
          echo "$output"
          echo "$output" | jq -e 'length > 0' || { echo "FAIL: expected non-empty JSON array"; exit 1; }

      - name: Smoke test (no issues on clean file)
        run: |
          echo "const x = 1;" > /tmp/clean.ts
          cargo run --release --locked -p pulsar-cli -- check /tmp/clean.ts
