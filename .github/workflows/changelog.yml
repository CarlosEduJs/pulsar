name: Changelog

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4
        with:
          config: cliff.toml
          args: --latest --output CHANGELOG.md
      - name: Update release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release view "$TAG" --json body --jq '.body' > /tmp/current_body.txt
          {
            cat CHANGELOG.md
            echo ""
            echo "---"
            echo ""
            cat /tmp/current_body.txt
          } > /tmp/combined.md
          gh release edit "$TAG" --notes-file /tmp/combined.md
