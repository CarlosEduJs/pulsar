[settings]
ignore = ["node_modules", "dist", "build"]
rules = [
  "no-select-star",
  "no-missing-limit",
  "no-unbounded-find",
  "no-always-true-where",
  "no-query-in-loop",
  "no-query-in-callback",
  "no-n-plus-one",
  "no-raw-sql-dangerous",
  "no-missing-await",
  "no-unindexed-filter",
  "no-unknown-column",
  "no-missing-foreign-key",
]

[database]
schema = "demos/schema/schema.prisma"
