# git-cliff configuration — https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% if commit.scope %} _({{ commit.scope }})_{% endif %}
{% endfor %}
{% endfor %}
"""
footer = """
---
_Generated by [git-cliff](https://github.com/orhun/git-cliff)._
"""
postprocessors = []
trim = true

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
commit_preprocessors = [
  { pattern = '\\((\\w+\\s)?#(\\d+)\\)', replace = "([#${2}](https://github.com/carlosedujs/pulsar/issues/${2}))" },
]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactoring" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^revert", group = "Revert" },
  { message = "^ci", group = "CI" },
  { message = "^chore", group = "Miscellaneous" },
  { body = ".*security", group = "Security" },
]
filter_commits = false
sort_commits = "oldest"
tag_pattern = "v[0-9].*"
skip_tags = []
ignore_tags = ""
topo_order = false
